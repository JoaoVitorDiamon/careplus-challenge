<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS BOOTSTAP -->
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- CSS externo -->
    <link rel="stylesheet" href="../css/login.css" />

    <!-- CDN font awesome / verificar qual fonte iremos usar-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- link icone-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>Care Plus - Login</title>

</head>

<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 login-container p-0 d-flex overflow-hidden bg-white shadow-lg rounded-4">
                
                <div class="row g-0 w-100 align-items-center">
                    
                    <div class="col-md-6 text-primary p-5 bg-light">
                        <img src="../images/LogoCarePlus.png" alt="Care Plus Logo" class="logo-careplus mb-4" >
                        <h1 class="display-5 fw-normal">BEM VINDO</h1>
                        <p class="text-muted">Página de pontuação da Care Plus Clinic — seu desempenho, sua saúde, sua jornada.</p>
                        <div class="mt-4 container-mascote text-center">
                            <img src="../images/Mascote.png" alt="Mascote" class="img-mascote img-fluid" >
                        </div>
                    </div>

                    <div class="col-md-6 p-4">
                        <div class="card border-0 p-3">
                            <div class="text-center mb-3">
                                <div class="bg-primary rounded-circle d-inline-block p-3">
                                    <i class="bi bi-person-circle text-white fs-2"></i>
                                </div>
                            </div>
                            <!-- Passo 1-->
                            <div id="step1">
                                <form onsubmit="nextStep(event, 2)">
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">CPF</label>
                                        <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Data de Nascimento</label>
                                        <input type="text" id="data" class="form-control" placeholder="DD/MM/AAAA">
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Entrar</button>
                                    <p class="text-center x-small text-muted small">* Código será enviado para o contato cadastrado.</p>
                                </form>
                            </div>
                            <!-- Passo 2-->
                            <div id="step2" class="d-none">
                                <p class="text-center fw-bold mb-4">Deseja receber o código por:</p>
                                <form onsubmit="nextStep(event, 3)">
                                    <div class=" opcao-contato bt-email mb-3 p-2 border rounded d-flex align-items-center">
                                        <i class="bi bi-envelope-fill me-3 text-primary fs-4"></i>
                                        <div>
                                            <div class=" fw-bold small">Email</div>
                                            <div class="text-muted small">maria***@gmail.com</div>
                                        </div>
                                    </div>
                                    <div class=" opcao-contato mb-4 p-2 border rounded d-flex align-items-center">
                                        <i class="bi bi-chat-dots-fill me-3 text-primary fs-4"></i>
                                        <div>
                                            <div class=" sms_bt fw-bold small">SMS</div>
                                            <div class="text-muted small">(11) 9****-1756</div>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2">Enviar Código</button>
                                    <button type="button" class="btn btn-link w-100 mt-2 text-muted small" onclick="nextStep(event, 1)">Voltar</button>
                                </form>
                            </div>
                            <!-- Passo 3-->
                            <div id="step3" class="d-none">
                                <form onsubmit="finishLogin(event)">
                                    <div class="text-center mb-4">
                                        <label class="fw-bold mb-3">Digite o código recebido</label>
                                        <div class="d-flex justify-content-between gap-2">
                                            <input type="text" class="form-control text-center fw-bold fs-4" maxlength="1" >
                                            <input type="text" class="form-control text-center fw-bold fs-4" maxlength="1" >
                                            <input type="text" class="form-control text-center fw-bold fs-4" maxlength="1" >
                                            <input type="text" class="form-control text-center fw-bold fs-4" maxlength="1" >
                                            <input type="text" class="form-control text-center fw-bold fs-4" maxlength="1" >
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2">Continuar</button>
                                    <button type="button" class="btn btn-link w-100 mt-2 text-muted small" onclick="nextStep(event, 2)">Reenviar código</button>
                                </form>
                            </div>

                        </div>
                    </div> 
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="../js/login.js"></script>

</body>
</html>
